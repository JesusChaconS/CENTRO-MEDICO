<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediCore - Acceso</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Plus Jakarta Sans for SaaS look -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Custom Styles -->
    <link rel="stylesheet" href="../styles/styles.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['"Plus Jakarta Sans"', 'sans-serif'],
                    },
                    colors: {
                        primary: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9', // Sky blue
                            600: '#0284c7',
                            700: '#0369a1',
                        },
                        dark: {
                            bg: '#0f172a',
                            card: '#1e293b',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 dark:bg-dark-bg text-slate-800 dark:text-slate-100 transition-colors duration-300 flex items-center justify-center min-h-screen">

    <!-- Decoración de Fondo -->
    <div class="fixed inset-0 overflow-hidden pointer-events-none">
        <div class="absolute -top-20 -left-20 w-96 h-96 bg-primary-500/10 rounded-full blur-3xl"></div>
        <div class="absolute top-1/2 right-0 w-80 h-80 bg-teal-500/10 rounded-full blur-3xl"></div>
    </div>

    <!-- Tarjeta de Login -->
    <div class="relative w-full max-w-md bg-white dark:bg-dark-card rounded-2xl shadow-xl border border-slate-200 dark:border-slate-700 p-8 fade-in z-10">
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-16 h-16 bg-primary-500/10 rounded-2xl mb-4 text-primary-600 dark:text-primary-400">
                <i data-lucide="activity" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-bold tracking-tight text-slate-900 dark:text-white">Medicore/h1>
            <p class="text-slate-500 dark:text-slate-400 mt-2">Gestión de Salud Integral</p>
        </div>

        <form class="space-y-6" id="login-form">
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Correo Electrónico</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i data-lucide="mail" class="w-4 h-4"></i>
                    </div>
                    <input type="email" id="email" required class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all text-slate-900 dark:text-white placeholder-slate-400" placeholder="doctor@medicore.com">
                </div>
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-slate-700 dark:text-slate-300 mb-1">Contraseña</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
                        <i data-lucide="lock" class="w-4 h-4"></i>
                    </div>
                    <input type="password" id="password" required class="w-full pl-10 pr-4 py-2.5 bg-slate-50 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg focus:ring-2 focus:ring-primary-500 focus:border-transparent outline-none transition-all text-slate-900 dark:text-white placeholder-slate-400" placeholder="••••••••">
                </div>
            </div>

            <div class="flex items-center justify-between">
                <div class="flex items-center">
                    <input id="remember-me" type="checkbox" class="h-4 w-4 text-primary-600 focus:ring-primary-500 border-slate-300 rounded">
                    <label for="remember-me" class="ml-2 block text-sm text-slate-600 dark:text-slate-400">Recordarme</label>
                </div>
                <div class="text-sm">
                    <a href="#" class="font-medium text-primary-600 hover:text-primary-500 dark:text-primary-400">¿Olvidaste tu contraseña?</a>
                </div>
            </div>

            <button id="iniciar-sesion" type="submit" class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-primary-600 hover:bg-primary-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 transition-all transform hover:scale-[1.02]" >
                Iniciar Sesión
            </button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-slate-500 dark:text-slate-400">
                ¿No tienes una cuenta? <a href="#" class="font-medium text-primary-600 hover:text-primary-500 dark:text-primary-400">Contáctanos</a>
            </p>
        </div>
    </div>

    <!-- Inicializar Iconos y Tema -->
    <script>
        // Inicializar iconos de Lucide
        lucide.createIcons();
        
        // Función para alternar tema
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            localStorage.setItem('theme', document.documentElement.classList.contains('dark') ? 'dark' : 'light');
        }
        
        // Cargar tema guardado
        const savedTheme = localStorage.getItem('theme');
        if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
        }
        
        // Agregar botón de alternar tema
        document.addEventListener('DOMContentLoaded', function() {
            const themeToggle = document.createElement('button');
            themeToggle.innerHTML = '<i data-lucide="moon" class="w-4 h-4"></i>';
            themeToggle.className = 'fixed top-4 right-4 p-2 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 shadow-lg hover:shadow-xl transition-all z-50';
            themeToggle.onclick = toggleTheme;
            document.body.appendChild(themeToggle);
            lucide.createIcons();
        });
    </script>

    <!-- Lógica de Login -->
    <script type="module" >
        // Importa la función de login desde el módulo de autenticación
        import { login } from '../services/authService.js';

        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault(); // Evita que el formulario se envíe de forma tradicional

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

        try{

            const data = await login(email, password); // Llama a la función de login con las credenciales
            
            // Si el login es exitoso, redirige al dashboard o muestra un mensaje de éxito
            if(data.usuario.rol === 'admin'){
                window.location.href = '../views/dashboard.html'; // Redirige al dashboard de admin
            } else if(data.usuario.rol === 'doctor'){
                window.location.href = '../views/dashboard.html'; // Redirige al dashboard de doctor
            } else {
                errorMsg.textContent = 'Rol de usuario desconocido';
                errorMsg.classList.remove('hidden');
            }
        }
        catch(error){
            console.log('Error en login:', error);
        }
        });
    </script>
</body>
</html>
